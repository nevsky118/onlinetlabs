[pytest]
asyncio_mode = auto
addopts = --disable-warnings -v
markers =
    unit: fast isolated tests
    integration: tests with mocked GNS3 API
    smoke: import and basic checks
    e2e: tests against real GNS3 in Docker
    api_client: tests for GNS3 API client
    mappers: tests for GNS3 model mapping
    log_buffer: tests for WebSocket log buffer
    config: tests for configuration
    conformance: SDK conformance tests
    domain_tools: tests for GNS3-specific MCP tools
    connection: tests for connection management
    server: tests for GNS3 server

[pytest]
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(message)s
log_file = pytest.log
log_file_level = INFO
log_file_format = %(asctime)s - %(message)s
addopts = --disable-warnings
markers =
    health_check: tests related to health checks
    smoke: quick tests to check basic functionality
    regress: comprehensive regression tests
    api: tests related to API endpoints
    crud: create, read, update, delete operations
    critical: critical for the application
    sanity: sanity checks (schema validation)
    manual_run: tests with side effects, run manually
    config: configuration tests
    e2e: end-to-end pipeline tests (GNS3 + MCP + agents)

filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning

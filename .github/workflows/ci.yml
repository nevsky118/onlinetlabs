name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [backend, gns3/gns3-mcp, gns3/gns3-service, mcp-sdk]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onlinetlabs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
      # Workspace has one root lock; sync it once at repo root regardless of
      # which member this matrix leg is testing.
      - name: Install dependencies (uv workspace)
        working-directory: .
        run: uv sync --locked
      # Ruff steps are informational until the in-flight MRT WIP is committed and
      # the full tree is formatted. Remove continue-on-error to make them blocking.
      - name: Ruff format check
        continue-on-error: true
        run: uv run ruff format --check .
      - name: Ruff lint
        continue-on-error: true
        run: uv run ruff check .
      # Informational until the type-error backlog (baseline ~100 errors) is worked
      # down. Remove continue-on-error once the backlog is ratcheted to zero.
      - name: Mypy
        if: matrix.package == 'backend'
        continue-on-error: true
        run: uv run mypy .
      - name: Alembic migrate + drift check
        if: matrix.package == 'backend'
        env:
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: onlinetlabs
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          JWT_SECRET: test-jwt-secret
          LOG_LEVEL: INFO
          CRED_ENCRYPTION_KEY: r1juy4ePJMqjrYbqXaCw7kDPq8Gwudckyv0wiIBIwfU=
          INTERNAL_API_TOKEN: test-internal-token
          YANDEX_API_KEY: sk-test
          YANDEX_FOLDER: test-folder
          AGENTS_CHAT_MODEL: yandex-gpt-5.1
          AGENTS_INTERVENTION_MODEL: yandex-gpt-5.1
          FRONTEND_URL: http://localhost:3000
          GNS3_SERVICE_URL: http://localhost:8101
          GNS3_PUBLIC_URL: http://localhost:3080
          GNS3_INTERNAL_URL: http://localhost:3080
          MCP_SERVER_URL: http://localhost:8100
        run: |
          uv run alembic upgrade head
          test "$(uv run alembic heads | wc -l)" -eq 1
          uv run alembic check
      - name: Tests
        run: |
          if [ -d tests ]; then
            uv run pytest tests -q
          else
            echo "no tests directory in ${{ matrix.package }} (covered elsewhere)"
          fi

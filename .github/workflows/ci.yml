name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [backend, gns3/gns3-mcp, gns3/gns3-service, mcp-sdk]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      # Ruff steps are informational until the in-flight MRT WIP is committed and
      # the full tree is formatted. Remove continue-on-error to make them blocking.
      - name: Ruff format check
        continue-on-error: true
        run: poetry run ruff format --check .
      - name: Ruff lint
        continue-on-error: true
        run: poetry run ruff check .
      - name: Tests
        run: |
          if [ -d tests ]; then
            poetry run pytest tests -q
          else
            echo "no tests directory in ${{ matrix.package }} (covered elsewhere)"
          fi

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="100%" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14">
  <style>
    .pc   { fill: #1e3a8a; stroke: #60a5fa; stroke-width: 2; }
    .sw   { fill: #064e3b; stroke: #34d399; stroke-width: 2; }
    .rt   { fill: #7c2d12; stroke: #fb923c; stroke-width: 2; }
    .node-label { fill: #f3f4f6; font-weight: 600; }
    .vlan10 { fill: #93c5fd; font-size: 12px; }
    .vlan20 { fill: #fca5a5; font-size: 12px; }
    .link   { stroke: #9ca3af; stroke-width: 2; fill: none; }
    .edge-label { fill: #d1d5db; font-size: 11px; }
  </style>

  <text x="70"  y="38"  text-anchor="middle" class="vlan10">VLAN 10</text>
  <text x="830" y="38"  text-anchor="middle" class="vlan10">VLAN 10</text>
  <rect class="pc" x="20"  y="60"  width="100" height="40"/>
  <text x="70"  y="86"  text-anchor="middle" class="node-label">PC1</text>
  <rect class="pc" x="780" y="60"  width="100" height="40"/>
  <text x="830" y="86"  text-anchor="middle" class="node-label">PC3</text>

  <rect class="sw" x="170" y="150" width="100" height="40"/>
  <text x="220" y="176" text-anchor="middle" class="node-label">SW1</text>
  <rect class="rt" x="320" y="150" width="100" height="40"/>
  <text x="370" y="176" text-anchor="middle" class="node-label">R1</text>
  <text x="370" y="208" text-anchor="middle" class="edge-label">router-id 1.1.1.1</text>
  <rect class="rt" x="480" y="150" width="100" height="40"/>
  <text x="530" y="176" text-anchor="middle" class="node-label">R2</text>
  <text x="530" y="208" text-anchor="middle" class="edge-label">router-id 2.2.2.2</text>
  <rect class="sw" x="630" y="150" width="100" height="40"/>
  <text x="680" y="176" text-anchor="middle" class="node-label">SW2</text>

  <rect class="pc" x="20"  y="240" width="100" height="40"/>
  <text x="70"  y="266" text-anchor="middle" class="node-label">PC2</text>
  <rect class="pc" x="780" y="240" width="100" height="40"/>
  <text x="830" y="266" text-anchor="middle" class="node-label">PC4</text>
  <text x="70"  y="306" text-anchor="middle" class="vlan20">VLAN 20</text>
  <text x="830" y="306" text-anchor="middle" class="vlan20">VLAN 20</text>

  <line class="link" x1="120" y1="80"  x2="170" y2="160"/>
  <line class="link" x1="120" y1="260" x2="170" y2="180"/>
  <line class="link" x1="270" y1="170" x2="320" y2="170"/>
  <text x="295" y="160" text-anchor="middle" class="edge-label">trunk</text>
  <line class="link" x1="420" y1="170" x2="480" y2="170"/>
  <text x="450" y="155" text-anchor="middle" class="edge-label">10.0.0.0/30</text>
  <line class="link" x1="580" y1="170" x2="630" y2="170"/>
  <text x="605" y="160" text-anchor="middle" class="edge-label">trunk</text>
  <line class="link" x1="730" y1="160" x2="780" y2="80"/>
  <line class="link" x1="730" y1="180" x2="780" y2="260"/>
</svg>

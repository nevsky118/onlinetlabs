[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = true
log_cli_level = INFO
log_file = pytest.log
log_file_level = INFO
addopts = -v
markers =
    unit: fast isolated tests without external dependencies
    config: tests for configuration loading, validation, and encryption
    auth: tests for authentication and authorization
    agents: tests for AI agents
    mcp: tests for MCP servers

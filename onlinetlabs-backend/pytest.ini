[pytest]
asyncio_mode = auto
addopts = --disable-warnings -v
markers =
    unit: fast isolated tests without external dependencies
    integration: tests that use DB, HTTP client, or filesystem
    smoke: quick tests to check basic functionality
    config: tests for configuration loading, validation, and encryption
    api: tests for API endpoints
    auth: tests for authentication and authorization
    courses: tests for courses module
    labs: tests for labs module
    progress: tests for progress tracking
    sessions: tests for learning sessions
    agents: tests for AI agents
    mcp: tests for MCP servers
    websocket: tests for WebSocket connections

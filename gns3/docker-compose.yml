# Dev-стек gns3. Минимум обвязки: без restart-полиси, без mem_limit/cpus,
# секреты — с разумными dev-дефолтами (без `:?required` маркеров).
# Для production-сайзинга и обязательных секретов используется overlay:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
services:
  gns3-server:
    build:
      context: gns3-server
    # dynamips/ubridge need raw networking + kernel modules.
    # pid=host: FRR/docker template nodes run on the host Docker daemon. ubridge
    # (inside gns3-server) must enter the FRR container's netns via its PID,
    # which is a host-level PID — invisible from a container-private pidns.
    privileged: true
    pid: host
    ports:
      - "3080:3080"
      # Консоли узлов (telnet). Backend проверяет конфиг студента, подключаясь к
      # консоли VPCS/FRR (`vpcs.show_ip`, `vpcs.ping`). Локально backend работает на
      # хосте, поэтому консольный диапазон GNS3 (аллоцируется с 5000) должен быть
      # опубликован — иначе spec-проверки висят на таймауте, LabProgressObserver не
      # успевает отдать ни одного цикла, и детектор режимов не получает сигнал.
      # 200 портов ≈ 50 студентов × 2 VPCS-консоли (в проде backend в той же
      # docker-сети и публикация не нужна).
      - "5000-5199:5000-5199"
    environment:
      GNS3_AUTH: "true"
      GNS3_DEFAULT_ADMIN_USER: ${GNS3_ADMIN_USER:-admin}
      GNS3_DEFAULT_ADMIN_PASSWORD: ${GNS3_ADMIN_PASSWORD:-admin}
      # When gns3-server constructs HostConfig.Mounts.Source for FRR/docker
      # template nodes, it uses paths inside its own container. The host
      # Docker daemon only understands host paths. Patched gns3server module
      # translates these prefixes before sending to Docker.
      # В dev дефолт — текущий путь репозитория; в prod overlay переопределяет.
      GNS3_BIND_PATH_TRANSLATION: "/data=${ONLINETLABS_HOST_ROOT:-.}/gns3/runtime/data;/root/.local/share/GNS3=${ONLINETLABS_HOST_ROOT:-.}/gns3/runtime/gns3-resources"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/v3/version"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      # FRR/docker template nodes: gns3-server constructs HostConfig.Mounts.Source
      # paths inside its own container, then asks the host Docker daemon to bind
      # them when launching node containers. For this to work, /data and the
      # docker resources dir must be host bind-mounts (not named volumes), so
      # the same path resolves on both gns3-server's view and the Docker daemon.
      - ./runtime/data:/data
      - ./images:/data/images
      - ./runtime/gns3-resources:/root/.local/share/GNS3
      # FRR (and any future docker-typed GNS3 templates) need GNS3 server to
      # talk to the host's Docker daemon to spawn container nodes.
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${GNS3_DB_USER:-gns3test}
      POSTGRES_PASSWORD: ${GNS3_DB_PASSWORD:-gns3test}
      POSTGRES_DB: ${GNS3_DB_NAME:-gns3_service_test}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GNS3_DB_USER:-gns3test}"]
      interval: 3s
      timeout: 2s
      retries: 5
    # Дев — эфемерный анонимный том. Prod overlay подменяет на named volume.
    # tmpfs тут НЕ используем: docker compose merge не умеет очистить tmpfs-список
    # из overlay, поэтому хранилище задаётся через volumes (анонимный том в dev,
    # named volume в prod).
    volumes:
      - /var/lib/postgresql/data

  gns3-service:
    build:
      context: ..
      dockerfile: gns3/gns3-service/Dockerfile.service
    ports:
      - "8101:8101"
    environment:
      GNS3_URL: http://gns3-server:3080
      GNS3_PUBLIC_URL: http://localhost:3080
      GNS3_ADMIN_USER: ${GNS3_ADMIN_USER:-admin}
      GNS3_ADMIN_PASSWORD: ${GNS3_ADMIN_PASSWORD:-admin}
      DB_USER: ${GNS3_DB_USER:-gns3test}
      DB_PASSWORD: ${GNS3_DB_PASSWORD:-gns3test}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${GNS3_DB_NAME:-gns3_service_test}
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8101
      LOG_LEVEL: INFO
      # Redis lives in a separate compose project (local-redis-1) — reach via host gateway.
      REDIS_URL: ${GNS3_REDIS_URL:-redis://host.docker.internal:6379/0}
      # Shared secret between backend and gns3-service for /v1/exec/vtysh auth.
      # Dev дефолт; prod overlay делает обязательным.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-secret}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # exec router invokes `docker exec <node-container-id>` on the host daemon
      # to run vtysh / ping inside FRR/docker node containers. The CLI is bundled
      # in the image (docker.io apt package).
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      gns3-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  gns3-mcp:
    build:
      context: ..
      dockerfile: gns3/gns3-mcp/Dockerfile
    ports:
      - "8100:8100"
    environment:
      MCP_SERVER_NAME: gns3
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8100
      GNS3_SERVICE_URL: http://gns3-service:8101
    depends_on:
      gns3-service:
        condition: service_healthy

  # build-only: GNS3 поднимает их как узлы; как сервисы не стартуют (profiles)
  frr-role:
    build:
      context: frr-role
    image: onlinetlabs/frr-role:9.1.0
    profiles: ["roles"]

  dhcp-role:
    build:
      context: dhcp-role
    image: onlinetlabs/dhcp-role:latest
    profiles: ["roles"]

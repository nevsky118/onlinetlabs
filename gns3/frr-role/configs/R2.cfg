hostname R2
!
interface eth0.10
 ip address 192.168.110.1/24
exit
!
interface eth0.20
 ip address 192.168.120.1/24
exit
!
interface eth1
 ip address 10.0.0.2/30
exit
!
router ospf
 ospf router-id 2.2.2.2
 network 10.0.0.0/30 area 0
 network 192.168.110.0/24 area 0
 network 192.168.120.0/24 area 0
exit

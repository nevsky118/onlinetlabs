; prod-only; userlist генерится из env (см. docker-compose.prod.yml)
[databases]
; wildcard: проксируем запрошенное имя БД в postgres как есть
; (dev=gns3_service_test, prod=gns3_service — постгрес создаёт БД по POSTGRES_DB)
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /tmp/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 100
reserve_pool_size = 20
reserve_pool_timeout = 5
server_idle_timeout = 60
server_lifetime = 3600
ignore_startup_parameters = extra_float_digits,search_path

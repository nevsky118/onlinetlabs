[databases]
; onlinetlabs: platform DB lives in a separate compose project (local-db-1).
; host.docker.internal works on Docker Desktop / OrbStack but NOT on plain
; Linux. For Linux production, add to pgbouncer service in compose:
;     extra_hosts:
;       - "host.docker.internal:host-gateway"
onlinetlabs = host=host.docker.internal port=5432 dbname=onlinetlabs
gns3_service_test = host=postgres port=5432 dbname=gns3_service_test

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
; Backend and gns3-service each use SQLAlchemy pool_size=20 + max_overflow=30 = 50 max.
; At 50 concurrent active sessions, both services may saturate their pools simultaneously
; → 100 per database. Bumped from 50 to leave room for both.
default_pool_size = 100
reserve_pool_size = 20
reserve_pool_timeout = 5
server_idle_timeout = 60
server_lifetime = 3600
ignore_startup_parameters = extra_float_digits,search_path

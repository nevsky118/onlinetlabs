[pytest]
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_file = pytest.log
log_file_level = INFO
addopts = --disable-warnings -v
markers =
    unit: fast isolated tests without external dependencies
    mappers: tests for GNS3 → SDK model mapping
    api_client: tests for GNS3 API client
    log_buffer: tests for WebSocket log buffer
    config: tests for configuration loading
    connection: tests for connection manager

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-onlinetlabs}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env
    environment:
      # Переопределяем хостовые localhost-адреса из .env на docker-сетевые.
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      # gns3-стек крутится отдельным compose с портами на хосте, тянемся к нему через host-gateway.
      GNS3_SERVICE_URL: http://host.docker.internal:8101
      MCP_SERVER_URL: http://host.docker.internal:8100
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* инлайнятся на build-time. Адреса браузерные, браузер открыт на хосте.
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
        NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    env_file:
      - ../../frontend/.env
    environment:
      # Серверные вызовы фронта к бэкенду идут по docker-сети, а не на localhost.
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
